<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InternHub DH — Sistema de Gestión de Pasantías</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg-primary: #0a0e14;
  --bg-secondary: #0f1419;
  --bg-elevated: #151b23;
  --bg-card: #1a2129;
  --bg-hover: #232b35;
  --border: #2a3441;
  --border-strong: #3a4552;
  --text-primary: #e6edf3;
  --text-secondary: #9aa5b1;
  --text-muted: #6b7785;
  --accent: #4f8cff;
  --accent-hover: #6da0ff;
  --accent-dim: rgba(79,140,255,.12);
  --accent-strong: rgba(79,140,255,.25);
  --success: #3fb950;
  --success-dim: rgba(63,185,80,.15);
  --warning: #f0b429;
  --warning-dim: rgba(240,180,41,.15);
  --danger: #f85149;
  --danger-dim: rgba(248,81,73,.15);
  --info: #58a6ff;
  --info-dim: rgba(88,166,255,.15);
  --purple: #a371f7;
  --purple-dim: rgba(163,113,247,.15);
  --display: 'Sora', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.5);
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--display);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse 80% 50% at 0% 0%, rgba(79,140,255,.05), transparent 50%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(163,113,247,.04), transparent 50%);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ===== LOGIN ===== */
.login-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(79,140,255,.1), transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(163,113,247,.08), transparent 60%),
    var(--bg-primary);
  padding: 20px; z-index: 1000; overflow-y: auto;
}
.login-card {
  width: 100%; max-width: 420px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 36px 32px;
  box-shadow: var(--shadow-lg);
}
.login-logo {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 20px; color: #fff;
  box-shadow: 0 8px 24px rgba(79,140,255,.3);
  margin-bottom: 20px;
}
.login-card h1 { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
.login-card .sub {
  color: var(--text-secondary); font-size: 13px; margin-top: 4px; margin-bottom: 26px;
}
.demo-section {
  margin-top: 22px; padding-top: 22px;
  border-top: 1px solid var(--border);
}
.demo-section .demo-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text-muted); font-family: var(--mono); margin-bottom: 12px;
}
.demo-btn {
  width: 100%; display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  transition: all .15s;
  text-align: left;
}
.demo-btn:hover { border-color: var(--accent); background: var(--bg-hover); }
.demo-btn .demo-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.demo-btn .demo-info { flex: 1; min-width: 0; }
.demo-btn .demo-name { font-size: 13px; font-weight: 600; }
.demo-btn .demo-role {
  font-size: 10px; color: var(--text-muted); font-family: var(--mono);
  text-transform: uppercase; letter-spacing: .8px;
}

/* ===== LAYOUT ===== */
.app { display: flex; height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: width .2s ease;
}
.sidebar-header {
  padding: 22px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.logo {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 16px; color: #fff;
  box-shadow: 0 4px 12px rgba(79,140,255,.3);
}
.logo-text h1 { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
.logo-text p {
  font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1.2px;
  font-family: var(--mono); margin-top: 2px;
}

.nav { flex: 1; overflow-y: auto; padding: 16px 12px; }
.nav-section { margin-bottom: 22px; }
.nav-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--text-muted); padding: 0 12px 8px;
  font-weight: 600; font-family: var(--mono);
}
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 12px;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 500;
  cursor: pointer;
  transition: all .15s ease;
  margin-bottom: 2px;
  position: relative;
}
.nav-item i { width: 18px; text-align: center; font-size: 14px; }
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: -12px; top: 25%; bottom: 25%;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}
.nav-item .nav-badge {
  margin-left: auto;
  font-size: 10px;
  background: var(--accent);
  color: #fff;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 700;
  font-family: var(--mono);
}

.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 11px;
  cursor: pointer;
  transition: background .15s;
}
.sidebar-footer:hover { background: var(--bg-hover); }
.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px; color: #fff;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-info .name {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-info .role {
  font-size: 10px; color: var(--text-muted);
  font-family: var(--mono);
  text-transform: uppercase; letter-spacing: .8px;
}

/* ===== MAIN ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: 64px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px;
  gap: 18px;
  flex-shrink: 0;
}
.breadcrumb {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-secondary);
}
.breadcrumb .current { color: var(--text-primary); font-weight: 600; }
.breadcrumb i { font-size: 9px; color: var(--text-muted); }
.topbar-spacer { flex: 1; }

.search-box {
  display: flex; align-items: center; gap: 9px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  width: 280px;
  transition: border-color .15s ease;
}
.search-box:focus-within { border-color: var(--accent); }
.search-box i { color: var(--text-muted); font-size: 12px; }
.search-box input {
  background: transparent; border: none; outline: none;
  color: var(--text-primary); flex: 1; font-size: 13px;
}
.search-box input::placeholder { color: var(--text-muted); }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600;
  transition: all .15s ease;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent); color: #fff;
  box-shadow: 0 2px 8px rgba(79,140,255,.25);
}
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(79,140,255,.35); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: var(--bg-elevated); color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-hover); border-color: var(--border-strong); }
.btn-ghost { color: var(--text-secondary); padding: 8px 12px; }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { filter: brightness(1.1); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-icon { padding: 8px 10px; }
.btn-lg { padding: 14px 24px; font-size: 14px; }
.btn-block { width: 100%; justify-content: center; }

.icon-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  transition: all .15s ease;
  position: relative;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.icon-btn .badge-dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg-secondary);
  transition: opacity .2s;
}
.icon-btn .badge-count {
  position: absolute;
  top: 3px; right: 3px;
  min-width: 16px; height: 16px;
  border-radius: 8px;
  background: var(--danger);
  border: 2px solid var(--bg-secondary);
  font-size: 9px;
  font-weight: 700;
  font-family: var(--mono);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  padding: 0 3px;
  line-height: 1;
}

/* ===== NOTIFICATION PANEL ===== */
.notif-panel {
  position: fixed;
  top: 64px; right: 12px;
  width: 360px;
  max-height: calc(100vh - 80px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  z-index: 150;
  display: flex; flex-direction: column;
  animation: slideInRight .18s ease;
  overflow: hidden;
}
.notif-panel-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.notif-panel-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.notif-panel-actions { display: flex; gap: 6px; }
.notif-panel-body { overflow-y: auto; flex: 1; }

.notif-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .12s;
  position: relative;
}
.notif-item:last-child { border-bottom: none; }
.notif-item:hover { background: var(--bg-hover); }
.notif-item.unread { background: var(--accent-dim); }
.notif-item.unread::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.notif-icon {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 1px;
}
.notif-icon.info    { background: var(--info-dim);    color: var(--info); }
.notif-icon.success { background: var(--success-dim); color: var(--success); }
.notif-icon.warning { background: var(--warning-dim); color: var(--warning); }
.notif-icon.danger  { background: var(--danger-dim);  color: var(--danger); }
.notif-icon.purple  { background: var(--purple-dim);  color: var(--purple); }

.notif-body { flex: 1; min-width: 0; }
.notif-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; line-height: 1.35; }
.notif-desc  { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
.notif-time  { font-size: 10px; color: var(--text-muted); font-family: var(--mono); margin-top: 5px; }

.notif-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
}
.notif-empty i { font-size: 28px; opacity: .35; margin-bottom: 10px; display: block; }
.notif-empty div { font-size: 13px; }

/* ===== CONTENT ===== */
.content {
  flex: 1; overflow-y: auto;
  padding: 28px;
  background: var(--bg-primary);
}

.page-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
}
.page-title {
  font-size: 26px; font-weight: 700;
  letter-spacing: -.5px; margin-bottom: 4px;
}
.page-subtitle { color: var(--text-secondary); font-size: 13.5px; }
.page-actions { display: flex; gap: 10px; align-items: center; }

/* ===== KPI CARDS ===== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative; overflow: hidden;
  transition: all .2s ease;
}
.kpi-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.kpi-card .kpi-icon {
  width: 38px; height: 38px;
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  margin-bottom: 14px;
}
.kpi-card.success .kpi-icon { background: var(--success-dim); color: var(--success); }
.kpi-card.warning .kpi-icon { background: var(--warning-dim); color: var(--warning); }
.kpi-card.danger .kpi-icon { background: var(--danger-dim); color: var(--danger); }
.kpi-card.info .kpi-icon { background: var(--info-dim); color: var(--info); }
.kpi-card.purple .kpi-icon { background: var(--purple-dim); color: var(--purple); }

.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  font-family: var(--mono);
  font-weight: 500;
  margin-bottom: 6px;
}
.kpi-value {
  font-size: 30px; font-weight: 700;
  letter-spacing: -1px; line-height: 1.1;
  margin-bottom: 6px;
}
.kpi-value .unit { font-size: 14px; color: var(--text-muted); font-weight: 500; margin-left: 4px; }
.kpi-trend {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11.5px; font-weight: 600;
  font-family: var(--mono);
}
.kpi-trend.up { color: var(--success); }
.kpi-trend.down { color: var(--danger); }
.kpi-trend.neutral { color: var(--text-muted); }

/* ===== PANELS ===== */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
}
.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.panel-title {
  font-size: 15px; font-weight: 600;
  display: flex; align-items: center; gap: 9px;
}
.panel-title i { color: var(--accent); font-size: 13px; }
.panel-body { padding: 20px; }

.charts-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.charts-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 1100px) {
  .charts-grid, .charts-grid-3 { grid-template-columns: 1fr; }
}
.chart-container { position: relative; height: 280px; }

/* ===== TABLE ===== */
.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--bg-elevated); }
th {
  text-align: left;
  padding: 11px 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-muted);
  font-weight: 600;
  font-family: var(--mono);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
  vertical-align: middle;
}
tbody tr { transition: background .15s ease; }
tbody tr:hover { background: var(--bg-hover); cursor: pointer; }
tbody tr:last-child td { border-bottom: none; }

.user-cell { display: flex; align-items: center; gap: 10px; }
.user-cell .avatar { width: 32px; height: 32px; font-size: 11px; }
.user-cell .meta { display: flex; flex-direction: column; }
.user-cell .meta .n { font-weight: 600; }
.user-cell .meta .e { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

/* ===== BADGES ===== */
.badge-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: .5px;
  border: 1px solid transparent;
}
.badge-success { background: var(--success-dim); color: var(--success); border-color: rgba(63,185,80,.3); }
.badge-warning { background: var(--warning-dim); color: var(--warning); border-color: rgba(240,180,41,.3); }
.badge-danger  { background: var(--danger-dim);  color: var(--danger);  border-color: rgba(248,81,73,.3); }
.badge-info    { background: var(--info-dim);    color: var(--info);    border-color: rgba(88,166,255,.3); }
.badge-muted   { background: var(--bg-elevated); color: var(--text-secondary); border-color: var(--border); }
.badge-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ===== FILTERS ===== */
.filter-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-bottom: 16px;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.filter-input, .form-control {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
}
.filter-input { min-width: 150px; }
.filter-input:focus, .form-control:focus { border-color: var(--accent); }
.filter-input option, .form-control option { background: var(--bg-elevated); }

/* ===== ATTENDANCE PUNCH (PASANTE) ===== */
.punch-card {
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(79,140,255,.1), transparent 70%),
    var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 32px;
  margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.punch-card .live-time {
  font-family: var(--mono);
  font-size: 56px;
  font-weight: 700;
  letter-spacing: -2px;
  background: linear-gradient(135deg, #fff, var(--accent));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.punch-card .live-date {
  color: var(--text-secondary);
  font-size: 14px;
  text-transform: capitalize;
  margin-bottom: 6px;
}
.punch-card .greeting {
  font-size: 22px; font-weight: 700;
  letter-spacing: -.4px; margin-top: 18px;
}
.punch-card .greeting-sub {

/* ===== MODAL ===== */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn .15s ease;
}
.modal-backdrop.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;

}
.modal.large { max-width: 900px; }

}

.modal-body { padding: 22px; overflow-y: auto; flex: 1; }
.modal-footer {

.form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

/* ===== TOAST ===== */
.toast-container {

.toast.info { border-left-color: var(--info); }

/** Devuelve una fecha ISO (YYYY-MM-DD) con offset de d_as desde hoy. */
function fmtISOOffset(dias) {
  const d = new Date();

/* ============================================================

   Persistente en localStorage, por usuario, con tipos:
   info | success | warning | danger | purple

/* db_notif ahora delega a Supabase */
const db_notif = {
  all: () => _cache._notifs || [],
  save: (n) => { _cache._notifs = n; },
};

/**
 * Crea una notificaci_n para uno o varios destinatarios.
 * @param {string|string[]} toUserIds  - IDs de destinatario(s), o all para todos
 * @param {object} opts - { tipo, icono, titulo, desc, accion? }
 */
async function pushNotif(toUserIds, opts) {
  const arr = db_notif.all();
  const ids = toUserIds === 'all'
    ? _db.users().map(u => u.id)
    : Array.isArray(toUserIds) ? toUserIds : [toUserIds];

  ids.forEach(uid => {
    arr.push({
      id: 'n' + Date.now() + Math.random().toString(36).slice(2, 6),
      userId: uid,
      tipo: opts.tipo || 'info',
      icono: opts.icono || 'fa-bell',
      titulo: opts.titulo,
      desc: opts.desc || '',
      accion: opts.accion || null,     // { tab, label } para navegar al hacer clic
      leida: false,
      creadoEn: new Date().toISOString(),
    });
  });
  db_notif.save(arr);
  // Persistir en Supabase (best-effort, no bloquea UI)
  ids.forEach(uid => db.pushNotifRow({ userId: uid, tipo: opts.tipo, icono: opts.icono, titulo: opts.titulo, desc: opts.desc, accion: opts.accion }).catch(()=>{}));
  refreshNotifBadge();
}

/**
 * Devuelve las notificaciones del usuario actual ordenadas por fecha desc.
 */
function getMisNotifs() {
  const user = getCurrentUser();
  if (!user) return [];
  return (_cache._notifs || []).sort((a, b) => b.creadoEn.localeCompare(a.creadoEn));
}

async function loadNotifs() {
  const user = getCurrentUser();
  if (!user) return;
  const data = await db.getNotifs(user.id);
  _cache._notifs = data.map(n => ({
    id: n.id, userId: n.user_id, tipo: n.tipo, icono: n.icono,
    titulo: n.titulo, desc: n.descripcion, accion: n.accion_tab ? { tab: n.accion_tab } : null,
    leida: n.leida, creadoEn: n.created_at,
  }));
  refreshNotifBadge();
}

function getMisNotifsNoLeidas() {
  return getMisNotifs().filter(n => !n.leida);
}

async function markRead(notifId) {
  const arr = db_notif.all();
  const n = arr.find(x => x.id === notifId);
  if (n) { n.leida = true; db_notif.save(arr); refreshNotifBadge(); renderNotifPanel(); }
  await db.markNotifRead(notifId).catch(()=>{});
}

function markAllRead() {
  const user = getCurrentUser();
  if (!user) return;
  const arr = db_notif.all();
  arr.filter(n => n.userId === user.id).forEach(n => n.leida = true);
  db_notif.save(arr);
  // Persistir en Supabase (best-effort, no bloquea UI)
  ids.forEach(uid => db.pushNotifRow({ userId: uid, tipo: opts.tipo, icono: opts.icono, titulo: opts.titulo, desc: opts.desc, accion: opts.accion }).catch(()=>{}));
  refreshNotifBadge();
  renderNotifPanel();
}

async function deleteNotif(notifId) {
  db_notif.save(db_notif.all().filter(n => n.id !== notifId));
  refreshNotifBadge();
  renderNotifPanel();
  await db.deleteNotif(notifId).catch(()=>{});
}

/** Actualiza el badge del bot_n campana con el conteo de no le_das. */
function refreshNotifBadge() {
  const count = getMisNotifsNoLeidas().length;
  const badge = document.getElementById('notifBadge');
  if (!badge) return;
  if (count > 0) {
    badge.style.display = 'flex';
    badge.textContent = count > 99 ? '99+' : count;
  } else {
    badge.style.display = 'none';
  }
  // Tambi_n actualizar el conteo del panel si est_ abierto
  const panelCount = document.getElementById('notifPanelCount');
  if (panelCount) {
    panelCount.textContent = count > 0 ? `${count} nueva${count > 1 ? 's' : ''}` : '';
    panelCount.style.display = count > 0 ? '' : 'none';
  }
}

/** Renderiza la lista dentro del panel. */
function renderNotifPanel() {
  const list = document.getElementById('notifList');
  if (!list) return;
  const notifs = getMisNotifs().slice(0, 50);
  if (notifs.length === 0) {
    list.innerHTML = `<div class="notif-empty"><i class="fas fa-bell-slash"></i><div>Sin notificaciones</div></div>`;
    return;
  }

  const iconMap = {
    info:    'fa-circle-info',
    success: 'fa-circle-check',
    warning: 'fa-triangle-exclamation',
    danger:  'fa-circle-exclamation',
    purple:  'fa-star',
  };

  list.innerHTML = notifs.map(n => `
    <div class="notif-item ${n.leida ? '' : 'unread'}" onclick="clickNotif('${n.id}')">
      <div class="notif-icon ${n.tipo}">

}

function toggleNotifPanel() {

  notifPanelOpen = !notifPanelOpen;
  panel.style.display = notifPanelOpen ? 'flex' : 'none';
  if (notifPanelOpen) renderNotifPanel();
}

/** Cierra el panel al hacer clic fuera de _l. */
document.addEventListener('click', (e) => {
  if (!notifPanelOpen) return;
  const panel = document.getElementById('notifPanel');
  const btn   = document.getElementById('notifBtn');
  if (panel && btn && !panel.contains(e.target) && !btn.contains(e.target)) {
    notifPanelOpen = false;
    panel.style.display = 'none';
  }
});

/** Tiempo relativo legible (hace X minutos, ayer, etc.) */
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1)  return 'ahora mismo';
  if (min < 60) return `hace ${min} min`;
  const h = Math.floor(min / 60);
  if (h < 24)   return `hace ${h}h`;
  const d = Math.floor(h / 24);
  if (d === 1)  return 'ayer';
  if (d < 7)    return `hace ${d} d_as`;
  return new Date(iso).toLocaleDateString('es-BO', { day: 'numeric', month: 'short' });
}

function cacheGet(key, ttl = 30000) {
  const e = _cache[key];
  return (e && Date.now() - e.ts < ttl) ? e.val : null;
}
function cacheClear(...keys) { keys.forEach(k => delete _cache[k]); }
function cacheClearAll() { Object.keys(_cache).forEach(k => delete _cache[k]); }

/* ============================================================
   ASISTENCIA -- L_gica
   ============================================================ */
function fechaHoyISO() { return new Date().toISOString().slice(0, 10); }
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function fmtTime(iso) { if (!iso) return '--'; const d = new Date(iso); return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
function fmtDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('es-BO', { day: '2-digit', month: 'short' });
}

/**
 * Convierte "HH:MM" a minutos totales del d_a (ej: "08:30" -&gt; 510).
 */
function timeToMinutes(hhmm) {
  const [h, m] = (hhmm || '08:00').split(':').map(Number);
  return h * 60 + m;
}

/**
 * Devuelve el horario efectivo del usuario (con fallback al default).
 */
function getUserSchedule(user) {
  return user?.schedule || DEFAULT_SCHEDULE;
}

/**
 * Calcula el estado de la entrada seg_n el horario individual del pasante.
 * Considera la tolerancia configurada por el gestor/encargado.
 */
function calcularEstado(date, user) {
  const sched = getUserSchedule(user);
  const totalMin = date.getHours() * 60 + date.getMinutes();
  const limiteMin = timeToMinutes(sched.horaEntrada) + (sched.toleranciaMin || 0);
  return totalMin <= limiteMin ? 'puntual' : 'tardanza';
}

/**
 * Verifica si hoy es d_a laborable seg_n el horario del pasante.
 * Un d_a feriado global tambi_n se considera no laborable.
 */
function esDiaLaborable(user, date) {
  const d = date || new Date();
  const sched = getUserSchedule(user);
  const dia = d.getDay();
  if (!(sched.diasLaborables || [1,2,3,4,5]).includes(dia)) return false;
  // Verificar si el d_a es feriado global
  const iso = d.toISOString().slice(0, 10);
  return !esFeriado(iso);
}

/* ============================================================
   VIGENCIA DE PASANT_A -- fechaInicio / fechaFin
   ============================================================ */
/**
 * D_as restantes hasta el fin de la pasant_a.
 * Negativo -&gt; ya venci_. 0 -&gt; vence hoy.
 */
function diasRestantes(user) {
  if (!user.fechaFin) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fin = new Date(user.fechaFin + 'T12:00:00');
  return Math.round((fin - hoy) / 86400000);
}

/**
 * Revisa todos los pasantes y:
 *  - Si vencieron (diasRestantes < 0) -&gt; desactiva la cuenta autom_ticamente.
 *  - Si les quedan _ 7 d_as -&gt; retorna lista de alertas para el gestor.
 */
function checkVigencias() {
  const users = _db.users();
  let changed = false;
  const alertas = [];

  users.filter(u => u.rol === 'pasante').forEach(p => {
    const dias = diasRestantes(p);
    if (dias === null) return;

    // Vencido -&gt; desactivar autom_ticamente
    if (dias < 0 && p.schedule?.activo !== false) {
      p.schedule = p.schedule || { ...DEFAULT_SCHEDULE };
      p.schedule.activo = false;
      p.schedule._autoDesactivado = true;
      changed = true;
      // Notificar al pasante y a los gestores
      pushNotif(p.id, {
        tipo: 'danger',
        icono: 'fa-calendar-xmark',
        titulo: 'Tu pasant_a ha vencido',
        desc: `La fecha fin de tu pasant_a (${p.fechaFin}) ha pasado. Tu cuenta fue desactivada autom_ticamente. Contacta al gestor.`,
        accion: { tab: 'profile' },
      });
      getGestores().forEach(g => pushNotif(g.id, {
        tipo: 'danger',
        icono: 'fa-user-clock',
        titulo: `Pasant_a vencida -- ${p.nombre}`,
        desc: `La pasant_a de ${p.nombre} (${p.area}) venci_ el ${p.fechaFin}. Cuenta desactivada autom_ticamente.`,
        accion: { tab: 'accounts' },
      }));
    }

    // Por vencer _ 7 d_as (y a_n activo)
    if (dias >= 0 && dias <= 7 && p.schedule?.activo !== false) {
      alertas.push({ user: p, dias });
      // Notificar al pasante (solo si no lo hemos notificado hoy ya)
      const yaNotif = db_notif.all().some(n =>
        n.userId === p.id &&
        n.icono === 'fa-calendar-exclamation' &&
        n.creadoEn.slice(0,10) === fechaHoyISO()
      );
      if (!yaNotif) {
        pushNotif(p.id, {
          tipo: 'warning',
          icono: 'fa-calendar-exclamation',
          titulo: `Tu pasant_a vence en ${dias} d_a${dias!==1?'s':''}`,
          desc: `Fecha fin: ${p.fechaFin}. Habla con tu encargado o el gestor si vas a renovar.`,
          accion: { tab: 'profile' },
        });
      }
    }
  });

  if (changed) {
    // Persistir cambios de desactivaci_n en Supabase (best-effort)
    users.filter(u => u.schedule?._autoDesactivado).forEach(u => {
      db.saveUserRow(mapUser(u)).catch(()=>{});
    });
  }
  return alertas;
}

/**
 * Extiende la fecha de fin de pasant_a de un pasante y reactiva su cuenta.
 */
function extenderPasantia(userId, nuevaFechaFin) {
  const users = _db.users();
  const u = users.find(x => x.id === userId);
  if (!u) return;
  u.fechaFin = nuevaFechaFin;
  if (u.schedule) {
    u.schedule.activo = true;
    delete u.schedule._autoDesactivado;
  }
  localStorage.setItem('ph_users', JSON.stringify(users));
  const current = getCurrentUser();
  if (current && current.id === userId) {
    localStorage.setItem('ph_currentUser', JSON.stringify(u));
  }
  toast(`Pasant_a extendida hasta ${formatDateFull(nuevaFechaFin)}`, 'success');
}

}

/* ============================================================
   GESTI_N DE CUENTAS -- Solo accesible para gestor
   ============================================================ */
const DIAS_NOMBRE = ['Domingo', 'Lunes', 'Martes', 'Mi_rcoles', 'Jueves', 'Viernes', 'S_bado'];
const DIAS_CORTO = ['D', 'L', 'M', 'M', 'J', 'V', 'S'];

const AVATAR_COLORS = ['av-blue', 'av-purple', 'av-pink', 'av-green', 'av-orange', 'av-cyan'];

/**
 * Formatea el horario de un pasante en una l_nea legible.
 * Ej: "08:00 - 17:00 _ L M M J V _ 15min"
 */
function formatSchedule(sched) {
  if (!sched) return 'Sin horario asignado';
  const dias = (sched.diasLaborables || []).map(d => DIAS_CORTO[d]).join(' ');
  return `${sched.horaEntrada} - ${sched.horaSalida} _ ${dias} _ tol. ${sched.toleranciaMin}min`;
}

/**
 * Formato compacto del horario.
 */
function formatScheduleShort(sched) {
  if (!sched) return '--';
  return `${sched.horaEntrada}-${sched.horaSalida}`;
}

/**
 * Crea una cuenta nueva (pasante o encargado). Solo el gestor llama esta funci_n.
 */
async function createUser(data) {
  const users = _db.users();
  // Validar email _nico
  if (users.some(u => u.email.toLowerCase() === data.email.toLowerCase())) {
    toast('Ya existe una cuenta con ese email', 'error');
    return false;
  }
  const newUser = {
    id: 'u' + Date.now(),
    email: data.email.toLowerCase().trim(),
    password: data.password,
    nombre: data.nombre.trim(),
    rol: data.rol,
    area: data.area || null,
    avatar: AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)],
  };
  // Solo los pasantes tienen horario y fechas de pasant_a
  if (data.rol === 'pasante') {
    newUser.schedule = data.schedule || { ...DEFAULT_SCHEDULE };
    if (data.fechaInicio) newUser.fechaInicio = data.fechaInicio;
    if (data.fechaFin)    newUser.fechaFin    = data.fechaFin;
    if (data.montoBono !== undefined) newUser.montoBono = parseFloat(data.montoBono) || 0;
  }
  try {
    const saved = await db.saveUserRow(newUser);
    if (saved?.id) newUser.id = saved.id;
    await db.users();
    toast(`Cuenta creada: ${newUser.nombre}`, 'success');

  // Bienvenida al nuevo pasante
  if (newUser.rol === 'pasante') {
    pushNotif(newUser.id, {
      tipo: 'success',
      icono: 'fa-user-graduate',
      titulo: `_Bienvenido/a, ${newUser.nombre.split(' ')[0]}!`,
      desc: `Tu cuenta de pasante en ${newUser.area} ha sido creada. Aqu_ podr_s registrar tu asistencia, actividades e informes.`,
      accion: { tab: 'home' },
    });
  }
  return true;
} catch(err) { toast('Error al crear cuenta: ' + (err.message||err), 'error'); return false; }
}

/**
 * Actualiza datos b_sicos de una cuenta.
 */
async function updateUser(userId, changes) {
  const users = _db.users();
  const u = users.find(x => x.id === userId);
  if (!u) return false;
  // Email _nico si cambi_
  if (changes.email && changes.email.toLowerCase() !== u.email) {
    if (users.some(x => x.id !== userId && x.email.toLowerCase() === changes.email.toLowerCase())) {
      toast('Ya existe una cuenta con ese email', 'error');
      return false;
    }
    changes.email = changes.email.toLowerCase().trim();
  }
  Object.assign(u, changes);
  try {
    await db.saveUserRow(u);
    await db.users();
    if (_currentUser && _currentUser.id === userId) _currentUser = mapUser(u);
    return true;
  } catch(err) { toast('Error al actualizar cuenta: ' + (err.message||''), 'error'); return false; }
}

/**
 * Actualiza solo el horario de un pasante.
 */
function updateUserSchedule(userId, schedule) {
  return updateUser(userId, { schedule });
}

/**
 * Activa/desactiva una cuenta sin borrarla.
 */
async function toggleUserActive(userId) {
  const users = _db.users();
  const u = users.find(x => x.id === userId);
  if (!u) return;
  if (u.rol === 'pasante') {
    u.schedule = u.schedule || { ...DEFAULT_SCHEDULE };
    u.schedule.activo = !u.schedule.activo;
    const activo = u.schedule.activo;
    try { await db.saveUserRow(u); await db.users(); toast(`Cuenta ${activo ? 'activada' : 'desactivada'}: ${u.nombre}`, 'success'); }
    catch(err) { toast('Error', 'error'); }
    pushNotif(u.id, {
      tipo: activo ? 'success' : 'warning',
      icono: activo ? 'fa-circle-play' : 'fa-circle-pause',
      titulo: activo ? 'Tu cuenta ha sido activada' : 'Tu cuenta ha sido desactivada',
      desc: activo
        ? 'Ya puedes acceder al sistema y registrar tu asistencia.'
        : 'Tu cuenta fue desactivada temporalmente. Contacta al gestor para m_s informaci_n.',
      accion: { tab: 'home' },
    });
  } else {
    u.activo = u.activo === false ? true : false;
    try { await db.saveUserRow(u); await db.users(); toast(`Cuenta ${u.activo ? 'activada' : 'desactivada'}: ${u.nombre}`, 'success'); }
    catch(err) { toast('Error', 'error'); }
  }
}

/**
 * Elimina una cuenta y sus datos asociados.
 */
async function deleteUser(userId) {
  const u = _db.users().find(x => x.id === userId);
  if (!u) return;
  if (u.rol === 'gestor') { toast('No se puede eliminar al gestor', 'error'); return; }
  if (!confirm(`_Eliminar permanentemente la cuenta de ${u.nombre}? Se borrar_n tambi_n sus asistencias y actividades.`)) return;

  localStorage.setItem('ph_users', JSON.stringify(_db.users().filter(x => x.id !== userId)));
  db.saveAttendance(_db.attendance().filter(a => a.userId !== userId));
  db.saveActivities(_db.activities().filter(a => a.userId !== userId));
  toast(`Cuenta eliminada: ${u.nombre}`, 'success');
  renderApp();
}

/**
 * Verifica si una cuenta est_ activa.
 */
function isUserActive(user) {
  if (user.rol === 'pasante') return user.schedule?.activo !== false;
  return user.activo !== false;
}

function renderPasanteActivities(user) {
  const todasLasActs = _db.activities().filter(a => a.userId === user.id);
  const hoy = fechaHoyISO();
  const ahora = new Date();

  // Mes a mostrar (controlado por URL-like state en el DOM)
  const mesState = window._calMes ?? ahora.getMonth();
  const anioState = window._calAnio ?? ahora.getFullYear();
  const mesActual = mesState;
  const anioActual = anioState;

  // Nombre del mes
  const nombreMes = new Date(anioActual, mesActual, 1)
    .toLocaleDateString('es-BO', { month: 'long', year: 'numeric' });

  // Actividades del mes visible indexadas por fecha
  const actsPorDia = {};
  todasLasActs.forEach(a => {
    const f = new Date(a.fecha + 'T12:00:00');
    if (f.getMonth() === mesActual && f.getFullYear() === anioActual) {
      if (!actsPorDia[a.fecha]) actsPorDia[a.fecha] = [];
      actsPorDia[a.fecha].push(a);
    }
  });

  // Calcular d_as del calendario
  const primerDia = new Date(anioActual, mesActual, 1);
  const ultimoDia = new Date(anioActual, mesActual + 1, 0);
  // lunes=0 ... domingo=6 (ajustar para semana que inicia en lunes)
  const inicioOffset = (primerDia.getDay() + 6) % 7;
  const totalCeldas = Math.ceil((inicioOffset + ultimoDia.getDate()) / 7) * 7;

  const DIAS_HEADER = ['Lun', 'Mar', 'Mi_', 'Jue', 'Vie', 'S_b', 'Dom'];

  let celdas = '';
  for (let i = 0; i < totalCeldas; i++) {
    const diaNum = i - inicioOffset + 1;
    if (diaNum < 1 || diaNum > ultimoDia.getDate()) {
      celdas += `<div class="cal-cell cal-empty"></div>`;
      continue;
    }
    const isoFecha = `${anioActual}-${pad(mesActual + 1)}-${pad(diaNum)}`;
    const esHoy = isoFecha === hoy;
    const esWeekend = (() => { const d = new Date(anioActual, mesActual, diaNum).getDay(); return d === 0 || d === 6; })();
    const actsDelDia = actsPorDia[isoFecha] || [];
    const tieneActs = actsDelDia.length > 0;
    const esFeriadoDia = esFeriado(isoFecha);

    // Calcular minutos totales del d_a
    const minutosTotales = actsDelDia.reduce((s, a) => s + (a.tiempoMinutos || 0), 0);

    celdas += `
      <div class="cal-cell ${esHoy ? 'cal-today' : ''} ${esWeekend ? 'cal-weekend' : ''} ${tieneActs ? 'cal-has-acts' : ''} ${esFeriadoDia ? 'cal-feriado' : ''}">
        <div class="cal-day-header">
          <span class="cal-day-num ${esHoy ? 'cal-today-num' : ''}">${diaNum}</span>
          ${tieneActs ? `<span class="cal-act-count">${actsDelDia.length} act.</span>` : ''}
          ${esHoy && !tieneActs ? `
            <button class="cal-add-btn" onclick="openActivityModal()" title="Agregar actividad hoy">
              <i class="fas fa-plus"></i>
            </button>
          ` : ''}
        </div>
        <div class="cal-acts-list">
          ${esFeriadoDia ? `<div class="cal-feriado-label"><i class="fas fa-star"></i>Feriado</div>` : ''}
          ${actsDelDia.map(a => `
            <div class="cal-act-chip ${isoFecha === hoy ? 'cal-act-today' : ''}"
                 title="${escapeHtml(a.descripcion)}"
                 onclick="openCalActivityDetail('${a.id}')">
              <span class="cal-act-text">${escapeHtml(a.descripcion)}</span>
              
            </div>
          `).join('')}

        </div>
      </div>
    `;
  }

  const totalMes = Object.values(actsPorDia).flat().length;
  const diasConActs = Object.keys(actsPorDia).length;
  const minutosMes = Object.values(actsPorDia).flat().reduce((s, a) => s + (a.tiempoMinutos || 0), 0);

  return `
    <div class="page-header">
      <div>
        <h1 class="page-title">Mis actividades</h1>
        <p class="page-subtitle" style="text-transform: capitalize;">${nombreMes} _ ${totalMes} actividades en ${diasConActs} d_as</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="openActivityModal()">
          <i class="fas fa-plus"></i> Nueva actividad
        </button>
      </div>
    </div>

    <!-- M_tricas del mes -->
    <div class="kpi-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 18px;">
      <div class="kpi-card success">
        <div class="kpi-icon"><i class="fas fa-list-check"></i></div>
        <div class="kpi-label">Actividades</div>
        <div class="kpi-value">${totalMes}</div>
        <div class="kpi-trend neutral">Este mes</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon"><i class="fas fa-calendar-days"></i></div>
        <div class="kpi-label">D_as con registro</div>
        <div class="kpi-value">${diasConActs}</div>
        <div class="kpi-trend neutral">De ${ultimoDia.getDate()} laborables</div>
      </div>

    </div>

    <!-- Calendario -->
    <div class="panel">
      <div class="panel-header">
        <button class="btn btn-ghost btn-icon" onclick="calNavegar(-1)" title="Mes anterior">
          <i class="fas fa-chevron-left"></i>
        </button>
        <div class="panel-title" style="justify-content: center; flex: 1; text-transform: capitalize;">
          <i class="fas fa-calendar-days"></i>${nombreMes}
        </div>
        <button class="btn btn-ghost btn-icon" onclick="calNavegar(1)" ${mesActual === ahora.getMonth() && anioActual === ahora.getFullYear() ? 'disabled style="opacity:.3;"' : ''} title="Mes siguiente">
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>
      <div class="panel-body" style="padding: 0;">
        <!-- Header d_as de la semana -->
        <div class="cal-week-header">
          ${DIAS_HEADER.map(d => `<div class="cal-week-day">${d}</div>`).join('')}
        </div>
        <!-- Grid del calendario -->
        <div class="cal-grid">
          ${celdas}
        </div>
      </div>
    </div>
  `;
}

/**
 * Navega al mes anterior (+) o siguiente (+1) en el calendario.
 */
function calNavegar(delta) {
  const ahora = new Date();
  let mes = window._calMes ?? ahora.getMonth();
  let anio = window._calAnio ?? ahora.getFullYear();
  mes += delta;
  if (mes < 0) { mes = 11; anio--; }
  if (mes > 11) { mes = 0; anio++; }
  // No navegar m_s all_ del mes actual
  if (anio > ahora.getFullYear() || (anio === ahora.getFullYear() && mes > ahora.getMonth())) return;
  window._calMes = mes;
  window._calAnio = anio;
  renderApp();
}

function renderActivitiesList(user) {
  const esGestor = user.rol === 'gestor';
  const pasantes = esGestor
    ? _db.users().filter(u => u.rol === 'pasante')
    : _db.users().filter(u => u.rol === 'pasante' && u.area === user.area);
  const areas = [...new Set(pasantes.map(p => p.area))];
  const ahora = new Date();
  const mesState  = window._mgCalMes  ?? ahora.getMonth();
  const anioState = window._mgCalAnio ?? ahora.getFullYear();
  const filtPasante = window._mgFiltPasante || '';
  const filtArea    = window._mgFiltArea    || '';

  const pasantesFiltrados = pasantes.filter(p =>
    (!filtArea    || p.area === filtArea) &&
    (!filtPasante || p.id   === filtPasante)
  );
  const idsFiltrados = pasantesFiltrados.map(p => p.id);

  const todasLasActs = _db.activities().filter(a => {
    const f = new Date(a.fecha + 'T12:00:00');
    return idsFiltrados.includes(a.userId)
      && f.getMonth()    === mesState
      && f.getFullYear() === anioState;
  });

  const actsPorDia = {};
  todasLasActs.forEach(a => {
    const p = pasantes.find(u => u.id === a.userId);
    if (!actsPorDia[a.fecha]) actsPorDia[a.fecha] = [];
    actsPorDia[a.fecha].push({ ...a, _pasante: p });
  });

  const nombreMes  = new Date(anioState, mesState, 1)
    .toLocaleDateString('es-BO', { month: 'long', year: 'numeric' });
  const primerDia  = new Date(anioState, mesState, 1);
  const ultimoDia  = new Date(anioState, mesState + 1, 0);
  const inicioOffset = (primerDia.getDay() + 6) % 7;
  const totalCeldas  = Math.ceil((inicioOffset + ultimoDia.getDate()) / 7) * 7;
  const DIAS_HEADER  = ['Lun','Mar','Mi_','Jue','Vie','S_b','Dom'];
  const hoy = fechaHoyISO();

  const CHIP_COLORS = [
    { border:'var(--accent)',  bg:'var(--accent-dim)'  },
    { border:'var(--success)', bg:'var(--success-dim)' },
    { border:'var(--purple)',  bg:'var(--purple-dim)'  },
    { border:'var(--warning)', bg:'var(--warning-dim)' },
    { border:'var(--info)',    bg:'var(--info-dim)'    },
    { border:'#f778ba',        bg:'rgba(247,120,186,.15)' },
  ];
  const colorMap = {};
  pasantes.forEach((p, i) => { colorMap[p.id] = CHIP_COLORS[i % CHIP_COLORS.length]; });

  let celdas = '';
  for (let i = 0; i < totalCeldas; i++) {
    const diaNum = i - inicioOffset + 1;
    if (diaNum < 1 || diaNum > ultimoDia.getDate()) {
      celdas += `<div class="cal-cell cal-empty"></div>`;
      continue;
    }
    const iso       = `${anioState}-${pad(mesState + 1)}-${pad(diaNum)}`;
    const esHoy     = iso === hoy;
    const esWeekend = (() => { const d = new Date(anioState,mesState,diaNum).getDay(); return d===0||d===6; })();
    const actsDelDia = actsPorDia[iso] || [];
    const tieneActs  = actsDelDia.length > 0;
    const pasantesDistintos = [...new Set(actsDelDia.map(a => a.userId))].length;
    const esFeriadoDia = esFeriado(iso);

    celdas += `
      <div class="cal-cell ${esHoy?'cal-today':''} ${esWeekend?'cal-weekend':''} ${tieneActs?'cal-has-acts':''} ${esFeriadoDia?'cal-feriado':''}">
        <div class="cal-day-header">
          <span class="cal-day-num ${esHoy?'cal-today-num':''}">${diaNum}</span>
          ${tieneActs ? `<span class="cal-act-count">${actsDelDia.length}a _ ${pasantesDistintos}p</span>` : ''}
        </div>
        <div class="cal-acts-list">
          ${esFeriadoDia ? `<div class="cal-feriado-label"><i class="fas fa-star"></i>Feriado</div>` : ''}
          ${actsDelDia.map(a => {
            const color    = colorMap[a.userId] || CHIP_COLORS[0];
            const p        = a._pasante;
            const initials = p ? p.nombre.split(' ').map(n=>n[0]).join('').slice(0,2) : '?';
            return `<div class="cal-act-chip cal-act-admin"
                         style="border-left-color:${color.border};background:${color.bg};"
                         title="${(p?.nombre||'')+': '+escapeHtml(a.descripcion)}"
                         onclick="openAdminActivityDetail('${a.id}')">
              <span class="cal-act-initials" style="background:${color.border};">${initials}</span>
              <span class="cal-act-text">${escapeHtml(a.descripcion)}</span>
              
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  const totalMes       = todasLasActs.length;
  const diasConActs    = Object.keys(actsPorDia).length;
  const minutosMes     = todasLasActs.reduce((s,a) => s+(a.tiempoMinutos||0), 0);
  const pasantesConActs= [...new Set(todasLasActs.map(a=>a.userId))].length;

  return `
    <div class="page-header">
      <div>
        <h1 class="page-title">Actividades del equipo</h1>
        <p class="page-subtitle" style="text-transform:capitalize;">${nombreMes} _ ${totalMes} actividades de ${pasantesConActs} pasantes</p>
      </div>
    </div>

    <div class="filter-bar">
      ${esGestor ? `
        <select class="filter-input" onchange="mgSetFiltro('area',this.value)">
          <option value="">Todas las _reas</option>
          ${areas.map(a=>`<option value="${a}" ${filtArea===a?'selected':''}>${a}</option>`).join('')}
        </select>` : ''}
      <select class="filter-input" onchange="mgSetFiltro('pasante',this.value)">
        <option value="">Todos los pasantes</option>
        ${pasantes.map(p=>`<option value="${p.id}" ${filtPasante===p.id?'selected':''}>${p.nombre}</option>`).join('')}
      </select>
      ${filtPasante||filtArea ? `
        <button class="btn btn-ghost" onclick="mgLimpiarFiltros()" style="padding:8px 12px;font-size:12px;">
          <i class="fas fa-xmark"></i> Limpiar
        </button>` : ''}
    </div>

    ${pasantesFiltrados.length>1 ? `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
        ${pasantesFiltrados.map(p=>{
          const c=colorMap[p.id]||CHIP_COLORS[0];
          return `<div style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;"
                       onclick="mgSetFiltro('pasante','${p.id}')">
            <span style="width:10px;height:10px;border-radius:2px;background:${c.border};flex-shrink:0;"></span>
            <span style="color:var(--text-secondary);">${p.nombre.split(' ')[0]}</span>
          </div>`;
        }).join('')}
      </div>` : ''}

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:18px;">
      <div class="kpi-card success">
        <div class="kpi-icon"><i class="fas fa-list-check"></i></div>
        <div class="kpi-label">Actividades</div>
        <div class="kpi-value">${totalMes}</div>
        <div class="kpi-trend neutral">Este mes</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon"><i class="fas fa-users"></i></div>
        <div class="kpi-label">Pasantes activos</div>
        <div class="kpi-value">${pasantesConActs}</div>
        <div class="kpi-trend neutral">Con registros</div>
      </div>
      <div class="kpi-card info">
        <div class="kpi-icon"><i class="fas fa-calendar-days"></i></div>
        <div class="kpi-label">D_as con actividad</div>
        <div class="kpi-value">${diasConActs}</div>
        <div class="kpi-trend neutral">Del mes</div>
      </div>

    </div>

    <div class="panel">
      <div class="panel-header">
        <button class="btn btn-ghost btn-icon" onclick="mgCalNavegar(-1)">
          <i class="fas fa-chevron-left"></i>
        </button>
        <div class="panel-title" style="justify-content:center;flex:1;text-transform:capitalize;">
          <i class="fas fa-calendar-days"></i>${nombreMes}
        </div>
        <button class="btn btn-ghost btn-icon" onclick="mgCalNavegar(1)"
          ${mesState===ahora.getMonth()&&anioState===ahora.getFullYear()?'disabled style="opacity:.3;"':''}>
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>
      <div class="panel-body" style="padding:0;">
        <div class="cal-week-header">
          ${DIAS_HEADER.map(d=>`<div class="cal-week-day">${d}</div>`).join('')}
        </div>
        <div class="cal-grid">${celdas}</div>
      </div>
    </div>`;
}

function mgCalNavegar(delta) {
  const ahora = new Date();
  let mes  = window._mgCalMes  ?? ahora.getMonth();
  let anio = window._mgCalAnio ?? ahora.getFullYear();
  mes += delta;
  if (mes < 0)  { mes = 11; anio--; }
  if (mes > 11) { mes = 0;  anio++; }
  if (anio > ahora.getFullYear() || (anio===ahora.getFullYear() && mes>ahora.getMonth())) return;
  window._mgCalMes  = mes;
  window._mgCalAnio = anio;
  renderApp();
}

function mgSetFiltro(tipo, valor) {
  if (tipo==='area')    window._mgFiltArea    = valor;
  if (tipo==='pasante') window._mgFiltPasante = valor;
  renderApp();
}

function mgLimpiarFiltros() {
  window._mgFiltArea    = '';
  window._mgFiltPasante = '';
  renderApp();
}

function renderGestor(user) {
  if (currentTab === 'home') return renderGestorHome(user);
  if (currentTab === 'pasantes') return renderTeam(user);
  if (currentTab === 'attendance') return renderAttendanceList(user);
  if (currentTab === 'activities') return renderActivitiesList(user);
  if (currentTab === 'reports') return renderReports(user);
  if (currentTab === 'analytics') return renderAnalytics(user);
  if (currentTab === 'accounts') return renderAccounts(user);
  if (currentTab === 'feriados') return renderFeriados(user);
  if (currentTab === 'informes_gestor') return renderInformesGestor(user);
  if (currentTab === 'bonos') return renderBonos(user);
  if (currentTab === 'profile') return renderProfile(user);

}

function renderGestorHome(user) {
  const pasantes = _db.users().filter(u => u.rol === 'pasante');
  const att = _db.attendance();

  const actsMes = acts.filter(a => a.fecha >= inicioMes);

        <div class="kpi-trend up"><i class="fas fa-arrow-up"></i> En ${areas.length} _reas</div>

        <div class="kpi-icon"><i class="fas fa-user-check"></i></div>
        <div class="kpi-label">Presentes hoy</div>

        <div class="kpi-trend up"><i class="fas fa-arrow-up"></i> ${pasantes.length > 0 ? Math.round(presentesHoy / pasantes.length * 100) : 0}% asistencia</div>
      </div>
      <div class="kpi-card warning">
        <div class="kpi-icon"><i class="fas fa-triangle-exclamation"></i></div>

      </div>
      <div class="kpi-card info">
        <div class="kpi-icon"><i class="fas fa-bullseye"></i></div>
        <div class="kpi-label">Puntualidad mes</div>
        <div class="kpi-value">${punt}<span class="unit">%</span></div>

        <div class="kpi-trend up"><i class="fas fa-arrow-up"></i> ${pasantes.length > 0 ? (actsMes.length / pasantes.length).toFixed(1) : 0} prom/pasante</div>

              const pPunt = pAttMes.length > 0 ? (pAttMes.filter(a => a.estado === 'puntual').length / pAttMes.length * 100) : 0;
              const score = Math.round(pPunt * 0.5 + Math.min(pAttMes.length / 20 * 100, 100) * 0.3 + Math.min(pActsMes.length / 15 * 100, 100) * 0.2);

                <td><span class="badge-pill badge-info">${p.area}</span></td>

          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderAnalytics(user) {

                    ` : '<span style="color:var(--text-muted);">--</span>'}

                  <td>

                  </td>
                  <td>
                    <div style="display:flex;gap:4px;">
                      ${u.rol === 'pasante' ? `
                        <button class="icon-btn" title="Configurar horario" onclick="event.stopPropagation(); openScheduleModal('${u.id}')" style="width:32px;height:32px;">
                          <i class="fas fa-clock"></i>
                        </button>
                        <button class="icon-btn" title="Extender pasant_a" onclick="event.stopPropagation(); openExtenderModal('${u.id}')" style="width:32px;height:32px;color:var(--success);">
                          <i class="fas fa-calendar-plus"></i>
                        </button>
                      ` : ''}

                        <i class="fas fa-pen"></i>

                      <button class="icon-btn" title="Eliminar" onclick="event.stopPropagation(); deleteUser('${u.id}')" style="width:32px;height:32px;color:var(--danger);">
                        <i class="fas fa-trash"></i>
                      </button>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

function filterAccounts() {
  const rol = document.getElementById('acRol')?.value || '';
  const area = document.getElementById('acArea')?.value || '';
  const estado = document.getElementById('acEstado')?.value || '';
  const nombre = (document.getElementById('acNombre')?.value || '').toLowerCase();
  document.querySelectorAll('#accountsTable tbody tr').forEach(row => {
    const ok = (!rol || row.dataset.rol === rol) &&
               (!area || row.dataset.area === area) &&
               (!estado || row.dataset.estado === estado) &&
               (!nombre || row.dataset.nombre.includes(nombre));
    row.style.display = ok ? '' : 'none';
  });
}

function setDuracionPasantia(dias) {
  const inicio = document.getElementById('uFechaInicio')?.value || fechaHoyISO();
  const fin = new Date(inicio + 'T12:00:00');
  fin.setDate(fin.getDate() + dias);
  const el = document.getElementById('uFechaFin');
  if (el) el.value = fin.toISOString().slice(0, 10);
}

/**
 * Formulario de horario reutilizable. El par_metro `prefix` evita conflictos de IDs
 * cuando el form se inserta en otro modal (como el modal de crear pasante).
 */
function renderScheduleForm(sched, prefix) {
  const p = prefix || 's';
  const dias = sched.diasLaborables || [1,2,3,4,5];
  return `
    <div class="form-grid">
      <div class="form-group full">
        <label class="form-label">Tipo de jornada</label>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
          <label class="schedule-preset" onclick="applySchedulePreset('${p}', 'completo')">
            <input type="radio" name="${p}Tipo" value="completo" ${sched.tipo === 'completo' ? 'checked' : ''} style="display: none;">
            <div class="schedule-preset-icon"><i class="fas fa-sun"></i></div>
            <div class="schedule-preset-title">Completo</div>
            <div class="schedule-preset-desc">8h diarias</div>
          </label>
          <label class="schedule-preset" onclick="applySchedulePreset('${p}', 'medio')">
            <input type="radio" name="${p}Tipo" value="medio" ${sched.tipo === 'medio' ? 'checked' : ''} style="display: none;">
            <div class="schedule-preset-icon"><i class="fas fa-cloud-sun"></i></div>
            <div class="schedule-preset-title">Medio tiempo</div>
            <div class="schedule-preset-desc">4h diarias</div>
          </label>
          <label class="schedule-preset" onclick="applySchedulePreset('${p}', 'personalizado')">
            <input type="radio" name="${p}Tipo" value="personalizado" ${sched.tipo === 'personalizado' ? 'checked' : ''} style="display: none;">
            <div class="schedule-preset-icon"><i class="fas fa-sliders"></i></div>
            <div class="schedule-preset-title">Personalizado</div>
            <div class="schedule-preset-desc">A medida</div>
          </label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Hora de entrada</label>
        <input type="time" class="form-control" id="${p}HoraEntrada" value="${sched.horaEntrada || '08:00'}">
      </div>
      <div class="form-group">
        <label class="form-label">Hora de salida</label>
        <input type="time" class="form-control" id="${p}HoraSalida" value="${sched.horaSalida || '17:00'}">
      </div>
      <div class="form-group full">
        <label class="form-label">D_as laborables</label>
        <div class="dia-toggles">
          ${[1,2,3,4,5,6,0].map(d => `
            <label class="dia-toggle">
              <input type="checkbox" value="${d}" ${dias.includes(d) ? 'checked' : ''}>
              <span>${DIAS_CORTO[d]}</span>
            </label>
          `).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Tolerancia (minutos)</label>
        <input type="number" class="form-control" id="${p}Tolerancia" min="0" max="60" value="${sched.toleranciaMin ?? 15}">
        <small style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">
          Minutos de gracia antes de marcar tardanza
        </small>
      </div>
      <div class="form-group">
        <label class="form-label">Estado de la cuenta</label>
        <div style="display: flex; align-items: center; gap: 10px; padding: 10px 13px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm);">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="${p}Activo" ${sched.activo !== false ? 'checked' : ''}>
            <span style="font-size: 13px;">Cuenta activa</span>
          </label>
        </div>
      </div>
    </div>
  `;
}

/**
 * Aplica un preset de horario al formulario.
 */
function applySchedulePreset(prefix, tipo) {
  const presets = {
    completo: { entrada: '08:00', salida: '17:00' },
    medio: { entrada: '08:00', salida: '12:00' },
    personalizado: null,
  };
  document.querySelectorAll(`input[name="${prefix}Tipo"]`).forEach(r => r.checked = (r.value === tipo));
  // Visual feedback en los presets
  document.querySelectorAll(`.schedule-preset`).forEach(el => {
    const radio = el.querySelector('input[type="radio"]');
    el.classList.toggle('active', radio?.checked);
  });
  if (presets[tipo]) {
    const e = document.getElementById(`${prefix}HoraEntrada`);
    const s = document.getElementById(`${prefix}HoraSalida`);
    if (e) e.value = presets[tipo].entrada;
    if (s) s.value = presets[tipo].salida;
  }
}

/**
 * Lee los datos del formulario de horario y devuelve el objeto schedule.
 */
function readScheduleFromForm(prefix) {
  const p = prefix || 's';
  const tipo = document.querySelector(`input[name="${p}Tipo"]:checked`)?.value || 'completo';
  const dias = [...document.querySelectorAll(`.dia-toggle input:checked`)].map(c => parseInt(c.value));
  return {
    horaEntrada: document.getElementById(`${p}HoraEntrada`).value,
    horaSalida: document.getElementById(`${p}HoraSalida`).value,
    toleranciaMin: parseInt(document.getElementById(`${p}Tolerancia`).value) || 0,
    diasLaborables: dias.length > 0 ? dias : [1,2,3,4,5],
    tipo,
    activo: document.getElementById(`${p}Activo`)?.checked !== false,
  };
}

function saveUserFromModal(rol, userId) {
  const nombre = document.getElementById('uNombre').value.trim();
  const email = document.getElementById('uEmail').value.trim();
  const password = document.getElementById('uPassword').value;
  const area = document.getElementById('uArea').value.trim();

  if (nombre.length < 3) { toast('El nombre debe tener al menos 3 caracteres', 'error'); return; }
  if (!email.match(/^[^@]+@[^@]+\.[^@]+$/)) { toast('Email inv_lido', 'error'); return; }
  if (!area) { toast('Debes asignar un _rea', 'error'); return; }

  // Validar fechas solo si es pasante
  let fechaInicio, fechaFin;
  if (rol === 'pasante') {
    fechaInicio = document.getElementById('uFechaInicio')?.value;
    fechaFin    = document.getElementById('uFechaFin')?.value;
    if (!fechaInicio) { toast('La fecha de inicio es obligatoria', 'error'); return; }
    if (!fechaFin)    { toast('La fecha de fin es obligatoria', 'error'); return; }
    if (fechaFin <= fechaInicio) { toast('La fecha de fin debe ser posterior al inicio', 'error'); return; }
  }

  if (userId) {
    const changes = { nombre, email, area };
    if (password) {
      if (password.length < 6) { toast('La contrase_a debe tener al menos 6 caracteres', 'error'); return; }
      changes.password = password;
    }
    if (rol === 'pasante') {
      changes.schedule = readScheduleFromForm('u');
      changes.fechaInicio = fechaInicio;
      changes.fechaFin = fechaFin;
      const mb = document.getElementById('uMontoBono')?.value;
      if (mb !== undefined) changes.montoBono = parseFloat(mb) || 0;
    }
    if (updateUser(userId, changes)) {
      toast('Cuenta actualizada', 'success');
      closeModal();
      renderApp();
    }
  } else {
    if (password.length < 6) { toast('La contrase_a debe tener al menos 6 caracteres', 'error'); return; }
    const data = { nombre, email, password, area, rol };
    if (rol === 'pasante') {
      data.schedule = readScheduleFromForm('u');
      data.fechaInicio = fechaInicio;
      data.fechaFin = fechaFin;
      data.montoBono = parseFloat(document.getElementById('uMontoBono')?.value) || 0;
    }
    if (createUser(data)) {
      closeModal();
      renderApp();
    }
  }
}

/**
 * Modal espec_fico para configurar solo el horario de un pasante.
 * Lo usa el gestor desde la tabla de cuentas y el encargado desde su equipo.
 */
function openScheduleModal(userId) {
  const u = _db.users().find(x => x.id === userId);
  if (!u || u.rol !== 'pasante') return;
  const sched = u.schedule || { ...DEFAULT_SCHEDULE };

  openModal(`
    <div class="modal-header">
      <div class="modal-title" style="display: flex; align-items: center; gap: 12px;">
        ${avatarHtml(u, 32)}
        <div>
          <div>Horario de ${u.nombre}</div>
          <div style="font-size: 12px; color: var(--text-muted); font-family: var(--mono); font-weight: 400;">${u.area}</div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div style="background: var(--accent-dim); border: 1px solid var(--accent); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 18px; display: flex; gap: 10px; align-items: flex-start;">
        <i class="fas fa-circle-info" style="color: var(--accent); margin-top: 2px;"></i>
        <div style="font-size: 12.5px; color: var(--text-secondary); line-height: 1.5;">
          La puntualidad se calcula a partir de la hora de entrada y la tolerancia configurada.
          Si el pasante registra entrada despu_s del l_mite (entrada + tolerancia), se marca autom_ticamente como tardanza.
        </div>
      </div>
      ${renderScheduleForm(sched, 's')}
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveScheduleFromModal('${userId}')">
        <i class="fas fa-check"></i> Guardar horario
      </button>
    </div>
  `);
  // Marcar visualmente el preset activo al abrir
  setTimeout(() => applySchedulePreset('s', sched.tipo || 'completo'), 50);
}

function saveScheduleFromModal(userId) {
  const newSched = readScheduleFromForm('s');
  if (timeToMinutes(newSched.horaSalida) <= timeToMinutes(newSched.horaEntrada)) {
    toast('La hora de salida debe ser posterior a la de entrada', 'error');
    return;
  }
  if (updateUserSchedule(userId, newSched)) {
    toast('Horario actualizado correctamente', 'success');
    closeModal();
    renderApp();
  }
}

function filterReports() {
  const area = document.getElementById('rArea')?.value || '';
  document.querySelectorAll('#reportsTable tbody tr').forEach(row => {
    row.style.display = !area || row.dataset.area === area ? '' : 'none';
  });
}

function getReportSummary(userId, mes, anio) {
  const att = _db.attendance().filter(a => {
    const f = new Date(a.fecha);
    return a.userId === userId && f.getMonth() + 1 === mes && f.getFullYear() === anio;
  });
  const acts = _db.activities().filter(a => {
    const f = new Date(a.fecha);
    return a.userId === userId && f.getMonth() + 1 === mes && f.getFullYear() === anio;
  });
  return `${att.length} d_as _ ${acts.length} actividades`;
}

/* ============================================================
   FERIADOS -- Vista del gestor
   ============================================================ */
function renderFeriados(user) {
  if (user.rol !== 'gestor') return '';
  const feriados = _db.feriados().sort((a, b) => a.fecha.localeCompare(b.fecha));
  const proximos = feriados.filter(f => f.fecha >= fechaHoyISO());
  const pasados  = feriados.filter(f => f.fecha < fechaHoyISO());

  // Mini-calendario del mes actual para selecci_n visual
  const ahora = new Date();
  const mesState  = window._ferCalMes  ?? ahora.getMonth();
  const anioState = window._ferCalAnio ?? ahora.getFullYear();
  const nombreMes = new Date(anioState, mesState, 1)
    .toLocaleDateString('es-BO', { month: 'long', year: 'numeric' });
  const primerDia   = new Date(anioState, mesState, 1);
  const ultimoDia   = new Date(anioState, mesState + 1, 0);
  const inicioOffset = (primerDia.getDay() + 6) % 7;
  const totalCeldas  = Math.ceil((inicioOffset + ultimoDia.getDate()) / 7) * 7;
  const DIAS_HDR     = ['L','M','M','J','V','S','D'];
  const ferSet = new Set(feriados.map(f => f.fecha));
  const hoy = fechaHoyISO();

  let celdas = '';
  for (let i = 0; i < totalCeldas; i++) {
    const diaNum = i - inicioOffset + 1;
    if (diaNum < 1 || diaNum > ultimoDia.getDate()) {
      celdas += `<div class="fer-cell fer-empty"></div>`;
      continue;
    }
    const iso       = `${anioState}-${pad(mesState + 1)}-${pad(diaNum)}`;
    const esFer     = ferSet.has(iso);
    const esHoy     = iso === hoy;
    const esPasado  = iso < hoy;
    const esWeekend = (() => { const d = new Date(anioState,mesState,diaNum).getDay(); return d===0||d===6; })();
    celdas += `
      <div class="fer-cell ${esFer?'fer-marcado':''} ${esHoy?'fer-hoy':''} ${esPasado?'fer-pasado':''} ${esWeekend?'fer-weekend':''}"
           onclick="${esFer ? `eliminarFeriadoFecha('${iso}')` : `openAddFeriado('${iso}')`}"
           title="${esFer ? 'Clic para eliminar feriado' : (esPasado ? 'No se pueden registrar feriados en el pasado' : 'Clic para marcar como feriado')}">
        <span class="fer-num ${esHoy?'fer-hoy-num':''}">${diaNum}</span>
        ${esFer ? '<i class="fas fa-star" style="font-size:9px;opacity:.7;"></i>' : ''}
      </div>`;
  }

  return `
    <div class="page-header">
      <div>
        <h1 class="page-title">D_as feriados</h1>
        <p class="page-subtitle">Los d_as marcados son excluidos de la marcaci_n para todos los pasantes _ ${proximos.length} pr_ximos</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="openAddFeriado()">
          <i class="fas fa-plus"></i> Registrar feriado
        </button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;">

      <!-- Mini-calendario interactivo -->
      <div class="panel">
        <div class="panel-header">
          <button class="btn btn-ghost btn-icon" onclick="ferCalNavegar(-1)"><i class="fas fa-chevron-left"></i></button>
          <div class="panel-title" style="justify-content:center;flex:1;text-transform:capitalize;">
            <i class="fas fa-calendar-xmark" style="color:var(--danger);"></i>${nombreMes}
          </div>
          <button class="btn btn-ghost btn-icon" onclick="ferCalNavegar(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="panel-body" style="padding:0;">
          <div class="fer-week-header">
            ${DIAS_HDR.map(d=>`<div class="fer-week-day">${d}</div>`).join('')}
          </div>
          <div class="fer-grid">${celdas}</div>
          <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:16px;font-size:11px;color:var(--text-muted);">
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--danger);margin-right:4px;"></span>Feriado</span>
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--accent);margin-right:4px;"></span>Hoy</span>
          </div>
        </div>
      </div>

      <!-- Lista de feriados -->
      <div>
        ${proximos.length > 0 ? `
          <div class="panel" style="margin-bottom:16px;">
            <div class="panel-header">
              <div class="panel-title"><i class="fas fa-calendar-xmark" style="color:var(--danger);"></i>Pr_ximos feriados</div>

function ferCalNavegar(delta) {
  const ahora = new Date();
  let mes  = window._ferCalMes  ?? ahora.getMonth();
  let anio = window._ferCalAnio ?? ahora.getFullYear();
  mes += delta;
  if (mes < 0)  { mes = 11; anio--; }
  if (mes > 11) { mes = 0;  anio++; }
  window._ferCalMes  = mes;
  window._ferCalAnio = anio;
  renderApp();
}

async function guardarFeriado() {
  const fecha = document.getElementById('ferFecha')?.value;
  const desc  = document.getElementById('ferDesc')?.value.trim();
  if (!fecha) { toast('Selecciona la fecha', 'error'); return; }
  if (fecha < fechaHoyISO()) { toast('No se pueden registrar feriados en el pasado', 'error'); return; }
  if (!desc)  { toast('Escribe una descripci_n', 'error'); return; }
  if (await agregarFeriado(fecha, desc)) { closeModal(); renderApp(); }
}

async function eliminarFeriadoFecha(iso) {
  const f = _db.feriados().find(x => x.fecha === iso);
  if (!f) return;
  await confirmarEliminarFeriado(f.id);
}

async function confirmarEliminarFeriado(id) {
  const f = _db.feriados().find(x => x.id === id);
  if (!f) return;
  if (confirm(`_Eliminar el feriado "${f.descripcion}" (${f.fecha})?`)) {
    await eliminarFeriado(id);
    renderApp();
  }
}

function openReportPicker(userId) {
  const ahora = new Date();
  const meses = [];
  for (let i = 0; i < 6; i++) {
    const d = new Date(ahora.getFullYear(), ahora.getMonth() - i, 1);
    meses.push({ mes: d.getMonth() + 1, anio: d.getFullYear(), label: d.toLocaleDateString('es-BO', { month: 'long', year: 'numeric' }) });

  const u = _db.users().find(x => x.id === userId);
  openModal(`
    <div class="modal-header">

      <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>

      </div>
    </div>
  `);
}

/**
 * Devuelve {desde, hasta} del per_odo de planilla que va del 26 del mes anterior
 * al 25 del mes indicado (o actual si no se pasa). Ambas fechas ISO YYYY-MM-DD.
 */
function getPeriodo(mes, anio) {
  // Per_odo: del 26 del mes anterior al 25 del mes actual
  const hasta = new Date(anio, mes - 1, 25);
  const desde = new Date(anio, mes - 2, 26);
  return {
    desde: desde.toISOString().slice(0, 10),
    hasta: hasta.toISOString().slice(0, 10),
    label: `26/${pad(mes === 1 ? 12 : mes - 1)} - 25/${pad(mes)}/${anio}`,
    mes, anio,
  };
}

/**
 * Cuenta los d_as h_biles dentro de [desde, hasta] seg_n el schedule de un pasante,
 * excluyendo feriados y aplicando los permisos aprobados.
 * Devuelve { habiles, feriados, fines, permisos }
 */
function calcularDiasHabiles(userId, desde, hasta) {
  const user = _db.users().find(u => u.id === userId);
  const sched = getUserSchedule(user);
  const ferSet = new Set(_db.feriados().map(f => f.fecha));
  const permisosAprobados = new Set(
    _db.permisos().filter(p => p.userId === userId && p.estado === 'aprobado').map(p => p.fecha)
  );
  let habiles = 0, fines = 0, feriadosCnt = 0, permisosCnt = 0;
  const d = new Date(desde + 'T12:00:00');
  const fin = new Date(hasta + 'T12:00:00');
  while (d <= fin) {
    const iso = d.toISOString().slice(0, 10);
    const diaSem = d.getDay();
    if (!(sched.diasLaborables || [1,2,3,4,5]).includes(diaSem)) { fines++; }
    else if (ferSet.has(iso)) { feriadosCnt++; }
    else if (permisosAprobados.has(iso)) { permisosCnt++; habiles++; } // permiso = d_a h_bil sin falta
    else { habiles++; }
    d.setDate(d.getDate() + 1);
  }
  return { habiles, feriados: feriadosCnt, fines, permisos: permisosCnt };
}

/**
 * Cuenta las faltas injustificadas en el per_odo: d_as h_biles sin check-in y sin permiso.
 */
function calcularFaltas(userId, desde, hasta) {
  const user = _db.users().find(u => u.id === userId);
  const sched = getUserSchedule(user);
  const ferSet = new Set(_db.feriados().map(f => f.fecha));
  const permisosAprobados = new Set(
    _db.permisos().filter(p => p.userId === userId && p.estado === 'aprobado').map(p => p.fecha)
  );
  const attSet = new Set(
    _db.attendance().filter(a => a.userId === userId && a.fecha >= desde && a.fecha <= hasta && a.horaEntrada).map(a => a.fecha)
  );
  let faltas = 0;
  const d = new Date(desde + 'T12:00:00');
  const fin = new Date(hasta + 'T12:00:00');
  while (d <= fin) {
    const iso = d.toISOString().slice(0, 10);
    const diaSem = d.getDay();
    if ((sched.diasLaborables || [1,2,3,4,5]).includes(diaSem) && !ferSet.has(iso) && !permisosAprobados.has(iso)) {
      if (!attSet.has(iso)) faltas++;
    }
    d.setDate(d.getDate() + 1);
  }
  return faltas;
}
