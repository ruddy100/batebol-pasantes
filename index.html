/* ============================================================
   PERMISOS -- CRUD
   ============================================================ */
/* ============================================================
   PERMISOS -- Tipos: dia_completo | medio_dia | horas
   Cada permiso tiene: fecha, tipo, horaInicio?, horaFin?,
   turno? (ma_ana|tarde -- para medio_dia), motivo, estado,
   y el campo derivado 'cubreEntrada' para saber si anula tardanza.
   ============================================================ */

async function solicitarPermiso(userId, datos) {
  const arr = _db.permisos();
  // Permitir m_ltiples permisos por fecha solo si son de tipo diferente/horas diferentes
  // pero bloquear duplicado exacto de mismo tipo/fecha
  const dup = arr.find(p =>
    p.userId === userId &&
    p.fecha === datos.fecha &&
    p.tipo === datos.tipo &&
    (datos.tipo !== 'horas' || (p.horaInicio === datos.horaInicio && p.horaFin === datos.horaFin))
  );
  if (dup) { toast('Ya existe una solicitud igual para esa fecha', 'error'); return false; }

  // Calcular si este permiso cubre el horario de entrada (para anular tardanza)
  const user = _db.users().find(u => u.id === userId);
  const sched = getUserSchedule(user);
  let cubreEntrada = false;
  if (datos.tipo === 'dia_completo') {
    cubreEntrada = true;
  } else if (datos.tipo === 'medio_dia') {
    cubreEntrada = datos.turno === 'manana';
  } else if (datos.tipo === 'horas' && datos.horaInicio && datos.horaFin) {
    // Cubre entrada si la ventana incluye la hora de entrada programada
    const entradaMin = timeToMinutes(sched.horaEntrada);
    const permisoIni = timeToMinutes(datos.horaInicio);
    const permisoFin = timeToMinutes(datos.horaFin);
    cubreEntrada = permisoIni <= entradaMin && entradaMin <= permisoFin;
  }

  try {
    await db.savePermisoRow({ userId, fecha: datos.fecha, tipo: datos.tipo, turno: datos.turno || null, horaInicio: datos.horaInicio || null, horaFin: datos.horaFin || null, motivo: datos.motivo, cubreEntrada });
    await db.permisos();
  } catch (err) { toast('Error al enviar solicitud', 'error'); return false; }
  toast('Solicitud de permiso enviada al encargado', 'success');

  // Notificar al encargado del _rea
  const encargado = getEncargadoDel(userId);
  if (encargado) pushNotif(encargado.id, {
    tipo: 'warning',
    icono: 'fa-calendar-plus',
    titulo: `Solicitud de permiso -- ${_db.users().find(u=>u.id===userId)?.nombre}`,
    desc: `${labelTipoPermiso({tipo:datos.tipo,turno:datos.turno,horaInicio:datos.horaInicio,horaFin:datos.horaFin})} _ ${datos.fecha} _ "${datos.motivo}"`,
    accion: { tab: 'informes' },
  });
  return true;
}

/**
 * Responde un permiso y, si se aprueba, corrige el estado de asistencia
 * de ese d_a en la tabla de attendance si ya exist_a registro.
 */
async function responderPermiso(permisoId, estado) {
  const arr = _db.permisos();
  const p = arr.find(x => x.id === permisoId);
  if (!p) return;
  const ahora2 = new Date().toISOString();
  try {
    await db.updatePermiso(permisoId, { estado, respondidoPor: getCurrentUser()?.nombre, respondidoEn: ahora2 });
    // actualizar cach_ local
    p.estado = estado; p.respondidoPor = getCurrentUser()?.nombre; p.respondidoEn = ahora2;
    await db.permisos();
  } catch(err) { toast('Error al responder permiso', 'error'); return; }

  // Corregir tardanza si aplica
  if (estado === 'aprobado' && p.cubreEntrada) {
    const attArr = _db.attendance();
    const reg = attArr.find(a => a.userId === p.userId && a.fecha === p.fecha);
    if (reg && reg.estado === 'tardanza') {
      reg.estado = 'puntual';
      reg.permisoCubre = p.id;
      db.saveAttendance(attArr);
    }
  }

  // Notificar al pasante
  const tipoLabel = labelTipoPermiso(p);
  if (estado === 'aprobado') {
    pushNotif(p.userId, {
      tipo: 'success',
      icono: 'fa-calendar-check',
      titulo: `Permiso aprobado -- ${p.fecha}`,
      desc: `${tipoLabel} aprobado por ${p.respondidoPor}.${p.cubreEntrada ? ' Tu tardanza/ausencia de ese d_a queda justificada.' : ''}`,
      accion: { tab: 'permisos' },
    });
  } else {
    pushNotif(p.userId, {
      tipo: 'danger',
      icono: 'fa-calendar-xmark',
      titulo: `Permiso rechazado -- ${p.fecha}`,
      desc: `Tu solicitud de ${tipoLabel} fue rechazada por ${p.respondidoPor}.`,
      accion: { tab: 'permisos' },
    });
  }

  toast(estado === 'aprobado' ? 'Permiso aprobado' : 'Solicitud rechazada',
        estado === 'aprobado' ? 'success' : 'warning');
}

/* Etiqueta legible del tipo de permiso */
function labelTipoPermiso(p) {
  if (p.tipo === 'dia_completo') return 'D_a completo';
  if (p.tipo === 'medio_dia') return p.turno === 'manana' ? 'Medio d_a -- ma_ana' : 'Medio d_a -- tarde';
  if (p.tipo === 'horas') return `Horas: ${p.horaInicio} - ${p.horaFin}`;
  return p.tipo;
}

function guardarPermiso(userId) {
  const tipo   = document.querySelector('input[name="pmTipo"]:checked')?.value;
  const fecha  = document.getElementById('pmFecha')?.value;
  const motivo = document.getElementById('pmMotivo')?.value.trim();
  const turno  = document.getElementById('pmTurno')?.value;
  const hIni   = document.getElementById('pmHoraIni')?.value;
  const hFin   = document.getElementById('pmHoraFin')?.value;

  if (!fecha)             { toast('Selecciona la fecha', 'error'); return; }
  if (motivo.length < 5)  { toast('Describe el motivo (m_nimo 5 caracteres)', 'error'); return; }
  if (tipo === 'horas' && (!hIni || !hFin)) { toast('Indica el rango de horas', 'error'); return; }
  if (tipo === 'horas' && hFin <= hIni)     { toast('La hora de fin debe ser posterior a la de inicio', 'error'); return; }

  const datos = { fecha, tipo, motivo,
    turno:      tipo === 'medio_dia' ? turno : null,
    horaInicio: tipo === 'horas' ? hIni : null,
    horaFin:    tipo === 'horas' ? hFin : null,
  };
  if (solicitarPermiso(userId, datos)) { closeModal(); renderApp(); }
}

   ============================================================ */
/**
 * Calcula el bono del per_odo para un pasante.
 * Reglas:
 *  - Base: montoBono (mensual) del pasante
 *  - Condiciones para el 100%: 0 faltas injustificadas + informe aprobado
 *  - Descuento por falta = montoBono / diasHabiles del per_odo
 *  - Si informe no aprobado: se marca como "pendiente aprobaci_n" (no se paga)
 */
function calcularBono(userId, mes, anio) {
  const user = _db.users().find(u => u.id === userId);
  const periodo = getPeriodo(mes, anio);
  const { habiles } = calcularDiasHabiles(userId, periodo.desde, periodo.hasta);
  const faltas = calcularFaltas(userId, periodo.desde, periodo.hasta);
  const informe = getInforme(userId, mes, anio);
  const informeAprobado = informe?.estado === 'aprobado';
  const monto = user?.montoBono || 0;
  const valorDia = habiles > 0 ? monto / habiles : 0;
  const descuento = faltas * valorDia;
  const bonoBruto = Math.max(0, monto - descuento);
  return {
    monto, habiles, faltas, valorDia: Math.round(valorDia * 100) / 100,
    descuento: Math.round(descuento * 100) / 100,
    bonoBruto: Math.round(bonoBruto * 100) / 100,
    informeAprobado,
    elegible: informeAprobado && faltas === 0,
    parcial: informeAprobado && faltas > 0,
    periodo: periodo.label,
  };
}

async function registrarPagoBono(userId, mes, anio, montoFinal, notas) {
  const arr = _db.bonos();
  // Solo un registro por per_odo
  const existing = arr.findIndex(b => b.userId === userId && b.mes === mes && b.anio === anio);
  const bono = {
    id: 'b' + Date.now(),
    userId, mes, anio,
    montoFinal: parseFloat(montoFinal),
    notas: notas || '',
    pagadoEn: new Date().toISOString(),
    pagadoPor: getCurrentUser()?.nombre || 'Gestor',
    estado: 'pagado',
  };
  try {
    await db.saveBonoRow({ userId, mes, anio, montoFinal: parseFloat(montoFinal), notas: notas||'', pagadoPor: getCurrentUser()?.nombre||'Gestor', pagadoEn: new Date().toISOString() });
    await db.bonos();
    toast(`Bono registrado: Bs. ${montoFinal}`, 'success');

    const periodo = `${MESES_NOMBRE[mes]} ${anio}`;
    pushNotif(userId, {
      tipo: 'purple',
      icono: 'fa-coins',
      titulo: `Bono de ${periodo} registrado`,
      desc: `Se registr_ el pago de tu bono por Bs. ${parseFloat(montoFinal).toFixed(2)}.${notas ? ' Nota: ' + notas : ''}`,
      accion: { tab: 'reports' },
    });
  } catch(err) { toast('Error al registrar bono: ' + (err.message||''), 'error'); }
}

/* Construye el HTML del descargo de bono para planilla */
function buildDescargoHTML(userId, mes, anio, montoFinal, notasAjuste) {
  const user    = _db.users().find(u => u.id === userId);
  const calc    = calcularBono(userId, mes, anio);
  const periodo = getPeriodo(mes, anio);
  const inf     = getInforme(userId, mes, anio);

  // Asistencias del per_odo completo
  const att = _db.attendance().filter(a => a.fecha >= periodo.desde && a.fecha <= periodo.hasta && a.userId === userId)
    .sort((a, b) => a.fecha.localeCompare(b.fecha));

  // Faltas (d_as h_biles sin asistencia ni permiso)
  const ferSet = new Set(_db.feriados().map(f => f.fecha));
  const permisosAprobados = new Set(
    _db.permisos().filter(p => p.userId === userId && p.estado === 'aprobado').map(p => p.fecha)
  );
  const attSet = new Set(att.filter(a => a.horaEntrada).map(a => a.fecha));
  const sched  = getUserSchedule(user);

  // Construir lista de d_as h_biles del per_odo con su estado
  const diasDetalle = [];
  const d = new Date(periodo.desde + 'T12:00:00');
  const fin = new Date(periodo.hasta + 'T12:00:00');
  while (d <= fin) {
    const iso = d.toISOString().slice(0, 10);
    const diaSem = d.getDay();
    if ((sched.diasLaborables || [1,2,3,4,5]).includes(diaSem)) {
      if (ferSet.has(iso)) {
        diasDetalle.push({ iso, tipo: 'feriado' });
      } else if (permisosAprobados.has(iso)) {
        diasDetalle.push({ iso, tipo: 'permiso' });
      } else if (attSet.has(iso)) {
        const reg = att.find(a => a.fecha === iso);
        diasDetalle.push({ iso, tipo: reg.estado === 'puntual' ? 'puntual' : 'tardanza' });
      } else {
        diasDetalle.push({ iso, tipo: 'falta' });
      }
    }
    d.setDate(d.getDate() + 1);
  }

  const diasHabiles  = diasDetalle.filter(d => d.tipo !== 'feriado').length;
  const diasTrabajados = diasDetalle.filter(d => ['puntual','tardanza','permiso'].includes(d.tipo)).length;
  const faltas       = diasDetalle.filter(d => d.tipo === 'falta').length;
  const valorDia     = diasHabiles > 0 ? (user.montoBono || 0) / diasHabiles : 0;
  const descuento    = faltas * valorDia;
  const montoBase    = user.montoBono || 0;

  const rowColor = (tipo) => ({
    puntual: '#d4edda', tardanza: '#fff3cd',
    falta: '#f8d7da', feriado: '#e2e3e5', permiso: '#cce5ff',
  }[tipo] || '#fff');

  const rowLabel = (tipo) => ({
    puntual: 'Asisti_ -- puntual', tardanza: 'Asisti_ -- tardanza',
    falta: 'FALTA injustificada', feriado: 'Feriado', permiso: 'Permiso aprobado',
  }[tipo] || tipo);

  return `
    <!-- Encabezado -->
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#666;margin-bottom:4px;">BATEBOL S.A. -- _rea de Planilla</div>
      <h2 style="font-size:20px;font-weight:900;color:#111;margin:0;">DESCARGO DE BONO DE PASANT_A</h2>
      <div style="font-size:12px;color:#555;margin-top:4px;">Per_odo: ${periodo.label}</div>
      ${inf?.estado==='aprobado' ? `<div style="display:inline-block;margin-top:6px;background:#d4edda;color:#155724;border:1px solid #c3e6cb;border-radius:4px;padding:2px 10px;font-size:11px;font-weight:700;">&#x2713;#10003; Informe aprobado por ${inf.aprobadoPor}</div>` : ''}
    </div>

    <!-- Datos del pasante -->
    <table style="width:100%;border-collapse:collapse;margin-bottom:16px;border:1px solid #dee2e6;">
      <tbody>
        <tr style="background:#f8f9fa;">
          <td style="padding:7px 12px;font-weight:700;font-size:12px;color:#333;width:30%;">Nombre completo</td>
          <td style="padding:7px 12px;font-size:13px;color:#111;">${user?.nombre}</td>
          <td style="padding:7px 12px;font-weight:700;font-size:12px;color:#333;width:25%;">_rea</td>
          <td style="padding:7px 12px;font-size:13px;color:#111;">${user?.area}</td>
        </tr>
        <tr>
          <td style="padding:7px 12px;font-weight:700;font-size:12px;color:#333;">Email</td>
          <td style="padding:7px 12px;font-size:13px;color:#111;">${user?.email}</td>
          <td style="padding:7px 12px;font-weight:700;font-size:12px;color:#333;">Bono base mensual</td>
          <td style="padding:7px 12px;font-size:13px;font-weight:700;color:#111;">Bs. ${montoBase.toFixed(2)}</td>
        </tr>
      </tbody>
    </table>

    <!-- Resumen de c_lculo -->
    <h3 style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#333;border-bottom:2px solid #333;padding-bottom:4px;margin:0 0 10px;">C_lculo del bono</h3>
    <table style="width:100%;border-collapse:collapse;margin-bottom:16px;">
      <tbody>
        <tr>
          <td style="padding:7px 10px;border:1px solid #dee2e6;font-size:13px;font-weight:600;background:#f8f9fa;color:#333;width:60%;">D_as h_biles programados en el per_odo</td>
          <td style="padding:7px 10px;border:1px solid #dee2e6;font-size:13px;font-weight:700;color:#111;text-align:right;">${diasHabiles} d_as</td>
        </tr>
        <tr>
          <td style="padding:7px 10px;border:1px solid #dee2e6;font-size:13px;font-weight:600;background:#f8f9fa;color:#333;">Valor por d_a h_bil</td>
          <td style="padding:7px 10px;border:1px solid #dee2e6;font-size:13px;font-weight:700;color:#111;text-align:right;">Bs. ${valorDia.toFixed(2)}</td>
        </tr>
        <tr>
          <td style="padding:7px 10px;border:1px solid #dee2e6;font-size:13px;font-weight:600;background:#f8f9fa;color:#333;">D_as trabajados (incl. tardanzas y permisos)</td>
          <td style="padding:7px 10px;border:1px solid #dee2e6;font-size:13px;font-weight:700;color:#111;text-align:right;">${diasTrabajados} d_as</td>
        </tr>
        <tr style="background:#f8d7da;">
          <td style="padding:7px 10px;border:1px solid #dee2e6;font-size:13px;font-weight:700;color:#721c24;">Faltas injustificadas</td>
          <td style="padding:7px 10px;border:1px solid #dee2e6;font-size:13px;font-weight:700;color:#721c24;text-align:right;">${faltas} d_as -&gt; _Bs. ${descuento.toFixed(2)}</td>
        </tr>
        ${(() => {
          const bonoBruto = Math.max(0, montoBase - descuento);
          const hayAjuste = Math.abs(parseFloat(montoFinal) - bonoBruto) >= 0.01;
          if (!hayAjuste) return '';
          const diferencia = parseFloat(montoFinal) - bonoBruto;
          const esAumento = diferencia > 0;
          return `
            <tr style="background:${esAumento ? '#d1ecf1' : '#fff3cd'};">
              <td style="padding:7px 10px;border:1px solid #dee2e6;font-size:13px;font-weight:700;color:${esAumento ? '#0c5460' : '#856404'};">
                Ajuste manual aprobado por gestor
                ${notasAjuste ? `<div style="font-size:11px;font-weight:400;margin-top:3px;font-style:italic;">Justificaci_n: ${escapeHtml(notasAjuste)}</div>` : ''}
              </td>
              <td style="padding:7px 10px;border:1px solid #dee2e6;font-size:13px;font-weight:700;color:${esAumento ? '#0c5460' : '#856404'};text-align:right;">
                ${esAumento ? '+' : ''}Bs. ${diferencia.toFixed(2)}
              </td>
            </tr>`;

      <div class="modal-title"><i class="fas fa-file-pdf" style="color:var(--accent);margin-right:8px;"></i>Vista previa del informe</div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="report-preview" id="reportContent">${buildReportHTML(userId, mes, anio)}</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="printReport()">
        <i class="fas fa-download"></i> Descargar PDF
      </button>
    </div>
  `, true);
}

function printReport() {
  const content = document.getElementById('reportContent').innerHTML;
  const w = window.open('', '_blank');
  w.document.write(`
    <!DOCTYPE html><html><head><title>Informe Mensual de Pasant_a</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: Arial, sans-serif; padding: 32px 40px; max-width: 800px; margin: 0 auto; color: #111; background: #fff; }
      h2 { color: #111; margin: 0 0 4px; }
      h3 { color: #333; }
      table { width: 100%; border-collapse: collapse; }
      td, th { color: #111; }
      p { color: #333; font-size: 13px; }
      @page { margin: 20mm 15mm; }
      @media print { body { padding: 0; } button { display: none !important; } }
    </style>
    </head><body>${content}
    <script>window.onload = () => window.print();<\/script>
    </body></html>
  `);
  w.document.close();
}

function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
  return Math.abs(hash).toString(16).padStart(8, '0').slice(0, 16).toUpperCase();
}

/* ============================================================
   CHARTS
   ============================================================ */
const chartDefaults = {
  fontFamily: "'Sora', sans-serif",
  textColor: '#9aa5b1',
  gridColor: 'rgba(42, 52, 65, 0.5)',
};

if (typeof Chart !== 'undefined') {
  Chart.defaults.font.family = chartDefaults.fontFamily;
  Chart.defaults.color = chartDefaults.textColor;
  Chart.defaults.borderColor = chartDefaults.gridColor;
}

let chartsRegistry = {};

function destroyChart(id) {
  if (chartsRegistry[id]) { chartsRegistry[id].destroy(); delete chartsRegistry[id]; }
}

function initCharts() {
  const user = getCurrentUser();
  if (!user) return;

  // Pasante home
  const elAP = document.getElementById('chartAsistenciaPasante');
  if (elAP) {
    destroyChart('chartAsistenciaPasante');
    const labels = [];
    const dataPunt = [];
    const dataTard = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const iso = d.toISOString().slice(0, 10);
      labels.push(d.toLocaleDateString('es-BO', { day: '2-digit', month: 'short' }));
      const reg = _db.attendance().find(a => a.userId === user.id && a.fecha === iso);
      dataPunt.push(reg?.estado === 'puntual' ? 1 : 0);
      dataTard.push(reg?.estado === 'tardanza' ? 1 : 0);
    }
    chartsRegistry['chartAsistenciaPasante'] = new Chart(elAP, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Puntual', data: dataPunt, backgroundColor: '#3fb950', borderRadius: 4 },
          { label: 'Tardanza', data: dataTard, backgroundColor: '#f0b429', borderRadius: 4 },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 12, font: { size: 11 } } } },
        scales: {
          x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 } } },
          y: { stacked: true, ticks: { stepSize: 1, font: { size: 10 } }, grid: { color: chartDefaults.gridColor } },
        },
      },
    });
  }

  // Encargado team attendance
  const elTA = document.getElementById('chartTeamAttendance');
  if (elTA) {
    destroyChart('chartTeamAttendance');
    const pasantes = _db.users().filter(u => u.rol === 'pasante' && u.area === user.area);
    const ids = pasantes.map(p => p.id);
    const labels = [];
    const data = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const iso = d.toISOString().slice(0, 10);
      if (d.getDay() === 0 || d.getDay() === 6) continue;
      labels.push(d.toLocaleDateString('es-BO', { day: '2-digit', month: 'short' }));
      const presentes = _db.attendance().filter(a => ids.includes(a.userId) && a.fecha === iso && a.horaEntrada).length;
      data.push(pasantes.length > 0 ? Math.round(presentes / pasantes.length * 100) : 0);
    }
    chartsRegistry['chartTeamAttendance'] = new Chart(elTA, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: '% Asistencia',
          data,
          borderColor: '#4f8cff',
          backgroundColor: 'rgba(79,140,255,.1)',
          fill: true, tension: 0.4,
          pointRadius: 3, pointBackgroundColor: '#4f8cff',
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 10 } } },
          y: { min: 0, max: 100, ticks: { callback: v => v + '%', font: { size: 10 } }, grid: { color: chartDefaults.gridColor } },
        },
      },
    });
  }

  // Encargado distribuci_n
  const elTD = document.getElementById('chartTeamDist');
  if (elTD) {
    destroyChart('chartTeamDist');
    const pasantes = _db.users().filter(u => u.rol === 'pasante' && u.area === user.area);

    const ahora = new Date();
    const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1).toISOString().slice(0, 10);

        responsive: true, maintainAspectRatio: false, cutout: '70%',

    });

  if (elAA) {

  const elAE = document.getElementById('chartAnalyticsEstado');
  if (elAE) {
    destroyChart('chartAnalyticsEstado');
    const ahora = new Date();
    const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1).toISOString().slice(0, 10);
    const att = _db.attendance().filter(a => a.fecha >= inicioMes);
    const puntuales = att.filter(a => a.estado === 'puntual').length;
    const tardanzas = att.filter(a => a.estado === 'tardanza').length;
    chartsRegistry['chartAnalyticsEstado'] = new Chart(elAE, {
      type: 'doughnut',
      data: {
        labels: ['Puntuales', 'Tardanzas'],
        datasets: [{ data: [puntuales, tardanzas], backgroundColor: ['#3fb950', '#f0b429'], borderWidth: 0 }],

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function toast(msg, type) {
  const container = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation', info: 'fa-circle-info' };
  t.innerHTML = `<i class="fas ${icons[type] || 'fa-circle-check'}"></i><div class="msg">${msg}</div>`;
  container.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}
